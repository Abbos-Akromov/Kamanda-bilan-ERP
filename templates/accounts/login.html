{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 border rounded shadow-sm mt-10">
    <h2 class="text-2xl font-bold mb-6 text-center">Tizimga kirish</h2>
    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Email</label>
            <input type="email" name="email" required class="w-full border rounded p-2 focus:outline-none focus:ring focus:ring-indigo-200">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium mb-1">Parol</label>
            <input type="password" name="password" required class="w-full border rounded p-2 focus:outline-none focus:ring focus:ring-indigo-200">
        </div>
        <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 rounded hover:bg-green-700">Kirish</button>
    </form>
</div>
{% endblock %}
